<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form - College ERP</title>
    <style>
        /* ========== INTERNAL CSS ========== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
        }

        textarea {
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Student Admission Form</h2>
        <form id="admissionForm">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="e.g. Rahul" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="e.g. Sharma" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="student@example.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="10-digit number" pattern="[0-9]{10}" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="course">Select Course</label>
                    <select id="course" name="course" required>
                        <option value="">Choose Course</option>
                        <option value="B.Tech (Computer Science)">B.Tech (Computer Science)</option>
                        <option value="B.Tech (Mechanical)">B.Tech (Mechanical)</option>
                        <option value="BCA">BCA</option>
                        <option value="BBA">BBA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="prevMarks">12th Percentage (%)</label>
                    <input type="number" id="prevMarks" name="prevMarks" placeholder="e.g. 85" min="0" max="100" required>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Permanent Address</label>
                <textarea id="address" name="address" rows="3" placeholder="Enter your full address here..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Admission</button>
        </form>
    </div>

    <script>
        /* ========== UPDATED INTERNAL JAVASCRIPT ========== */
        document.getElementById('admissionForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const formData = new FormData(this);
            const studentData = {};
            
            formData.forEach((value, key) => {
                studentData[key] = value;
            });

            console.log("Sending Data to Database:", studentData);

            try {
                // YAHAN CHANGE KIYA HAI: Pura URL hatakar sirf '/api/admission' kar diya hai
                const response = await fetch('/api/admission', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(studentData) 
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Success: " + result.message);
                    this.reset(); 
                } else {
                    alert("Error: " + result.message);
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                alert("Server se connect nahi ho paya. Error check karein.");
            }
        });
    </script>

</body>
</html>
